command_timeout = 3000

# Git branch - ブランチ名を表示
[git_branch]
format = "on [$branch]($style)"
style = "bold purple"

# Git commit - 短縮ハッシュを表示
[git_commit]
commit_hash_length = 7
format = " [\\[$hash\\]]($style)"
style = "green"

only_detached = false  # detached HEADでなくても常に表示


# Git status - インジケータを表示

[git_status]

format = "[\\[$all_status$ahead_behind\\]]($style) "

style = "red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

untracked = "?"
stashed = "\\$"

modified = "!"
staged = "+"
renamed = "»"

deleted = "✘"

# GitHub PR - 現在のブランチに紐づくPR番号をリポジトリ名付きで表示（bktでキャッシュ）
[custom.github_pr]
command = "bkt --ttl=5m --stale=1m --cwd -- gh pr view --json number,headRepository -q '(.headRepository.name) + \"#\" + (.number | tostring)' 2>/dev/null"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[($output)](bold cyan) "
shell = ["bash", "--norc", "--noprofile"]
description = "Show repo/PR number with caching"

[directory]
truncation_length = 3
truncate_to_repo = false
truncation_symbol = ".../"
